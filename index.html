<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정보 교과 탐험 - 미니게임</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root{
    --purple:#4834d4; --purple2:#686de0; --bg1:#667eea; --bg2:#764ba2;
    --ink:#2d3436; --muted:#8a8f9c;
  }
  body{
    font-family:'Malgun Gothic','맑은 고딕',sans-serif;
    background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 100%);
    min-height:100vh; color:var(--ink);
    display:flex; align-items:flex-start; justify-content:center;
    padding:18px; overflow-x:hidden;
  }
  .app{ width:100%; max-width:520px; }

  /* ===== 공통 카드/버튼 ===== */
  .card{ background:#fff; border-radius:24px; box-shadow:0 20px 60px rgba(0,0,0,.28); padding:22px 20px 26px; }
  h1{ font-size:24px; text-align:center; color:var(--purple); }
  .subtitle{ text-align:center; color:var(--muted); font-size:13px; margin:4px 0 16px; }
  .btn{ border:none; border-radius:14px; padding:12px 16px; font-size:15px; font-weight:bold;
        cursor:pointer; transition:transform .1s, filter .15s; font-family:inherit; }
  .btn:active{ transform:scale(.96); }
  .btn-primary{ background:var(--purple); color:#fff; }
  .btn-ghost{ background:#f1f2f6; color:#555; }
  .btn-primary:hover{ filter:brightness(1.08); }
  .topbar{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .topbar .title{ font-size:18px; font-weight:bold; color:var(--purple); flex:1; }
  .back{ background:#f1f2f6; border:none; border-radius:12px; padding:8px 12px; font-size:14px; cursor:pointer; font-family:inherit; }
  .hidden{ display:none !important; }

  /* ===== 학교 건물(허브) ===== */
  .school{ position:relative; }
  .flag{ width:3px; height:34px; background:#5f6672; margin:0 auto; position:relative; }
  .flag::after{ content:""; position:absolute; left:3px; top:2px; width:26px; height:16px;
    background:var(--purple); clip-path:polygon(0 0,100% 0,80% 50%,100% 100%,0 100%); }
  .roof{ height:0; border-left:26px solid transparent; border-right:26px solid transparent;
    border-bottom:40px solid #b33939; width:calc(100% - 0px); margin:0 auto;
    border-bottom-color:#c0392b; filter:drop-shadow(0 4px 6px rgba(0,0,0,.15)); }
  .floor{ background:#fdf6e3; border:3px solid #e8dcc0; border-top:none; padding:12px;
    position:relative; }
  .floor:first-of-type{ border-top:3px solid #e8dcc0; border-radius:0; }
  .floor .floor-tag{ position:absolute; left:8px; top:8px; font-size:11px; font-weight:bold;
    color:#b7791f; background:#fff5d6; border:1px solid #f0e0a8; border-radius:8px; padding:2px 7px; }
  .rooms{ display:grid; gap:8px; margin-top:20px; }
  .rooms.c1{ grid-template-columns:1fr; }
  .rooms.c2{ grid-template-columns:1fr 1fr; }
  .rooms.c3{ grid-template-columns:1fr 1fr; }
  .room{ background:#fff; border:2px solid #dfe4ea; border-radius:12px; padding:12px 8px;
    text-align:center; cursor:pointer; transition:all .15s; }
  .room:hover{ border-color:var(--purple); transform:translateY(-3px); box-shadow:0 8px 18px rgba(72,52,212,.18); }
  .room .icon{ font-size:26px; display:block; }
  .room .rname{ display:block; font-size:13px; font-weight:bold; margin-top:4px; color:#333; }
  .room .rgame{ display:block; font-size:11px; color:var(--muted); margin-top:2px; }
  .room .rcredit{ display:block; font-size:10px; color:#e8a100; font-weight:bold; margin-top:5px; line-height:1.5; }
  /* 스네이크 방: 이벤트 코너처럼 노란 불빛 */
  .room.glow{ border-color:#f0b429; background:linear-gradient(135deg,#fff8e1,#ffefba);
    animation:roomGlow 1.8s ease-in-out infinite; }
  .room.glow:hover{ border-color:#e8a100; transform:translateY(-3px); }
  @keyframes roomGlow{ 0%,100%{ box-shadow:0 0 2px rgba(240,180,41,.4);} 50%{ box-shadow:0 0 22px rgba(240,180,41,.85);} }
  .footer{ text-align:center; margin-top:22px; font-size:13px; color:#b2bec3; }
  .footer b{ color:#6c5ce7; }
  .ground{ height:16px; background:#7bed9f; border:3px solid #2ed573; border-top:none;
    border-radius:0 0 16px 16px; }
  .door{ width:46px; height:34px; background:#8b5a2b; border-radius:8px 8px 0 0; margin:0 auto;
    border:2px solid #6b4423; border-bottom:none; position:relative; }
  .door::after{ content:""; position:absolute; right:7px; top:15px; width:5px; height:5px; border-radius:50%; background:#f5d76e; }

  /* ===== 게임 공용 무대 ===== */
  .stage{ min-height:60px; }
  .hud{ display:flex; gap:8px; margin-bottom:12px; }
  .hud .pill{ flex:1; background:#f1f2f6; border-radius:12px; padding:8px; text-align:center; }
  .hud .pill .l{ font-size:11px; color:var(--muted); }
  .hud .pill .v{ font-size:18px; font-weight:bold; color:var(--purple); }
  .msg{ text-align:center; font-size:14px; margin:10px 0; min-height:20px; font-weight:bold; }
  .msg.good{ color:#20bf6b; } .msg.bad{ color:#eb3b5a; }
  .center{ text-align:center; }
  .row{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .mt10{ margin-top:10px; } .mt16{ margin-top:16px; }

  /* 결과 모달 */
  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; padding:24px; z-index:50; }
  .modal{ background:#fff; border-radius:20px; padding:24px 20px; max-width:360px; width:100%; text-align:center; }
  .modal h2{ color:var(--purple); font-size:22px; margin-bottom:8px; }
  .modal p{ color:#555; font-size:14px; line-height:1.6; margin-bottom:6px; }
  .promo{ background:#f3f0ff; border:1px dashed #b8b0ff; border-radius:12px; padding:12px; margin:14px 0; font-size:13px; color:#5b4bd6; line-height:1.6; }

  /* ===== 첫 접속 과목 선택 팝업(입장 게이트) ===== */
  .overlay.gate{ z-index:100; }
  .gate .modal{ max-width:440px; text-align:center; max-height:calc(100vh - 40px); overflow:auto; }
  .gate h2{ font-size:20px; color:var(--purple); margin-bottom:8px; line-height:1.35; }
  .gate .gate-sub{ font-size:13px; color:#555; line-height:1.7; }
  .gate .gate-promo{ background:#fff8e1; border:1px dashed #f0c651; border-radius:12px; padding:11px 12px;
    font-size:12.5px; color:#a6791f; line-height:1.7; margin:12px 0; }
  .gate .gate-promo b{ color:#e8a100; }
  .gate-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:12px 0 6px; }
  .gate-chip{ display:flex; align-items:center; gap:8px; border:2px solid #dfe4ea; border-radius:12px;
    padding:10px; cursor:pointer; background:#fff; font-size:13px; font-weight:bold; color:#444;
    text-align:left; font-family:inherit; transition:all .12s; }
  .gate-chip:active{ transform:scale(.97); }
  .gate-chip .gi{ font-size:20px; flex:none; }
  .gate-chip .gt{ flex:1; min-width:0; }
  .gate-chip .gc{ width:20px; height:20px; border-radius:50%; border:2px solid #cfd6df; flex:none;
    display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff; }
  .gate-chip.on{ border-color:var(--purple); background:#f3f0ff; color:var(--purple); }
  .gate-chip.on .gc{ background:var(--purple); border-color:var(--purple); }
  .gate-count{ font-size:13px; font-weight:bold; color:var(--muted); margin:8px 0 12px; }
  .gate-count b{ color:var(--purple); font-size:15px; }
  .gate .btn-primary[disabled]{ opacity:.45; cursor:not-allowed; }

  /* ===== 미로 ===== */
  .maze{ display:grid; width:max-content; margin:0 auto; background:#fff; border:3px solid var(--purple); border-radius:8px; overflow:hidden; touch-action:none; }
  .cell{ position:relative; background:#fff; }
  .cell.wN{ border-top:2px solid var(--purple); }
  .cell.wE{ border-right:2px solid var(--purple); }
  .cell.wS{ border-bottom:2px solid var(--purple); }
  .cell.wW{ border-left:2px solid var(--purple); }
  .cell.player::after{ content:"🙂"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .cell.goal{ background:#eaffea; }
  .cell.goal::before{ content:"🚪"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .dpad{ display:grid; grid-template-columns:repeat(3,54px); grid-template-rows:repeat(2,48px); gap:6px; justify-content:center; margin-top:14px; }
  .dpad button{ border:none; background:var(--purple); color:#fff; font-size:20px; border-radius:12px; cursor:pointer; }
  .dpad button:active{ background:var(--purple2); }
  .dpad .u{ grid-column:2; grid-row:1; } .dpad .l{ grid-column:1; grid-row:2; }
  .dpad .d{ grid-column:2; grid-row:2; } .dpad .r{ grid-column:3; grid-row:2; }

  /* ===== 분류(AI) ===== */
  .flash{ font-size:96px; text-align:center; margin:14px 0; }
  .cls-btns{ display:flex; gap:12px; }
  .cls-btns button{ flex:1; font-size:18px; padding:16px; border-radius:16px; border:2px solid #dfe4ea; background:#fff; cursor:pointer; font-family:inherit; font-weight:bold; }
  .cls-btns button:active{ transform:scale(.96); }

  /* ===== 그래프 ===== */
  .bars{ display:flex; align-items:flex-end; gap:12px; height:180px; padding:10px 6px; justify-content:center; border-bottom:2px solid #ccc; }
  .bar{ width:44px; background:linear-gradient(180deg,var(--purple2),var(--purple)); border-radius:8px 8px 0 0; position:relative; transition:height .4s; }
  .bar span{ position:absolute; bottom:-22px; left:0; right:0; text-align:center; font-size:20px; }
  .bar b{ position:absolute; top:-20px; left:0; right:0; text-align:center; font-size:12px; color:#555; }
  .choices{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:34px; }
  .choices button{ padding:14px; border:2px solid #dfe4ea; background:#fff; border-radius:14px; font-size:16px; cursor:pointer; font-family:inherit; font-weight:bold; }

  /* ===== 물감 정렬 ===== */
  .tubes{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin:16px 0; }
  .tube{ width:46px; height:170px; border:3px solid #b2bec3; border-top:none;
    border-radius:0 0 22px 22px; display:flex; flex-direction:column-reverse; padding:4px; gap:3px; cursor:pointer; background:#fff; transition:transform .12s; }
  .tube.sel{ transform:translateY(-12px); border-color:var(--purple); }
  /* 항상 4칸 고정 높이 → 칠해진 칸 수·빈칸이 명확히 구분됨 */
  .seg{ flex:1 1 0; min-height:0; border-radius:5px; }
  .seg.fill{ box-shadow:inset 0 -2px 0 rgba(0,0,0,.14), inset 0 1px 0 rgba(255,255,255,.35); }
  .seg.empty{ background:#eef1f5; border:1px dashed #c2cad4; }

  /* ===== 틀린 그림 ===== */
  .spot{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .grid{ display:grid; gap:4px; background:#f1f2f6; border-radius:12px; padding:8px; }
  .grid .g{ aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:min(6vw,22px); cursor:pointer; border-radius:6px; user-select:none; }
  .grid .g:active{ background:#dcdde1; }
  .spot-label{ text-align:center; font-size:12px; color:var(--muted); margin-bottom:4px; }

  /* ===== 불 끄기(두더지) ===== */
  .holes{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:14px 0; }
  .hole{ aspect-ratio:1; background:#3d3d5c; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:min(9vw,40px); cursor:pointer; user-select:none; overflow:hidden; }
  .hole.fire{ background:#ff7675; animation:pop .2s; }
  @keyframes pop{ from{ transform:scale(.6);} to{ transform:scale(1);} }

  /* ===== 순서 맞추기 ===== */
  .order-list{ display:flex; flex-direction:column; gap:8px; margin:14px 0; }
  .oitem{ display:flex; align-items:center; gap:10px; background:#fff; border:2px solid #dfe4ea; border-radius:12px; padding:12px; }
  .oitem .txt{ flex:1; font-size:14px; }
  .oitem .num{ width:26px; height:26px; border-radius:50%; background:#f1f2f6; display:flex; align-items:center; justify-content:center; font-weight:bold; color:var(--purple); font-size:13px; }
  .oitem .mv{ display:flex; flex-direction:column; gap:2px; }
  .oitem .mv button{ border:none; background:#f1f2f6; border-radius:6px; width:28px; height:18px; cursor:pointer; font-size:11px; }

  /* ===== 매칭 ===== */
  .match{ display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  .mcol{ display:flex; flex-direction:column; gap:8px; }
  .mcell{ border:2px solid #dfe4ea; border-radius:12px; padding:12px 8px; text-align:center; font-size:13px; cursor:pointer; background:#fff; min-height:52px; display:flex; align-items:center; justify-content:center; }
  .mcell.sel{ border-color:var(--purple); background:#f3f0ff; }
  .mcell.done{ border-color:#20bf6b; background:#eaffea; color:#178f52; cursor:default; }

  /* ===== 4층 이벤트 코너 ===== */
  .floor.event .room{ border:2px solid #f0b429; background:linear-gradient(135deg,#fff8e1,#ffefba); }
  .floor.event .room:hover{ border-color:#e8a100; box-shadow:0 8px 18px rgba(240,180,41,.3); }
  .event-form{ display:flex; flex-direction:column; gap:14px; margin-top:6px; }
  .field-row{ display:flex; gap:12px; }
  .field-row .field{ flex:1; min-width:0; }
  .req{ color:#eb3b5a; font-weight:bold; }
  .field label{ display:block; font-size:13px; font-weight:bold; margin-bottom:6px; color:#555; }
  .field input{ width:100%; padding:11px 12px; border:2px solid #dfe4ea; border-radius:12px; font-size:15px; font-family:inherit; }
  .field input:focus{ outline:none; border-color:var(--purple); }
  .acrostic{ display:flex; align-items:center; gap:10px; }
  .acrostic .syl{ width:44px; height:46px; flex:none; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:bold; color:#fff; background:var(--purple); border-radius:12px; }
  .acrostic input{ flex:1; }
  .ev-note{ font-size:12px; color:var(--muted); text-align:center; line-height:1.6; }
  .ev-poem{ background:#f3f0ff; border:1px dashed #b8b0ff; border-radius:14px; padding:16px; margin:12px 0; text-align:center; line-height:1.9; font-size:16px; }
  .ev-poem b{ color:var(--purple); margin-right:6px; }

  /* ===== 스네이크 게임 ===== */
  .snake-wrap{ display:flex; justify-content:center; margin:10px 0 4px; }
  canvas.snake{ background:#1e1e2f; border-radius:12px; touch-action:none; image-rendering:pixelated; max-width:100%; }
  .snake-credit{ text-align:center; font-size:11px; color:var(--muted); margin-top:10px; line-height:1.6; }
  .snake-credit b{ color:var(--purple); }
  .snake-ctrl{ display:flex; justify-content:flex-end; margin:2px 0 -4px; }
  .mute-btn{ border:none; background:#f1f2f6; color:#555; border-radius:10px; padding:6px 11px;
    font-size:13px; font-weight:bold; cursor:pointer; font-family:inherit; transition:transform .1s; }
  .mute-btn:active{ transform:scale(.94); }

  /* ===== 스네이크 순위판 ===== */
  .rank-box{ background:#f8f9ff; border:1px solid #e6e9ff; border-radius:12px; padding:10px 12px; margin:12px 0 10px; }
  .rank-title{ font-size:13px; font-weight:bold; color:var(--purple); margin-bottom:6px; text-align:center; }
  .rank-list{ list-style:none; max-height:170px; overflow-y:auto; }
  .rank-list li{ display:flex; align-items:center; gap:8px; padding:5px 2px; font-size:13px; border-bottom:1px dashed #eee; }
  .rank-list li:last-child{ border-bottom:none; }
  .rank-list .rk{ width:26px; text-align:center; font-weight:bold; color:#f0b429; }
  .rank-list .rn{ flex:1; text-align:left; color:#333; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rank-list .rs{ font-weight:bold; color:var(--purple); }
  .rank-loading,.rank-empty{ color:#999; justify-content:center; }
  .rank-form{ display:flex; gap:8px; margin-bottom:2px; }
  .rank-form input{ flex:1; min-width:0; padding:10px 11px; border:2px solid #dfe4ea; border-radius:10px; font-size:14px; font-family:inherit; }
  .rank-form input:focus{ outline:none; border-color:var(--purple); }
</style>
</head>
<body>
<div class="app">
  <!-- ========== 허브(학교 건물) ========== -->
  <div id="hub" class="card school">
    <h1>정보 교과 탐험 🏫</h1>
    <p class="subtitle">교실을 눌러 미니게임을 즐겨보세요!</p>
    <div class="flag"></div>
    <div class="roof"></div>

    <div class="floor event">
      <span class="floor-tag">4층</span>
      <div class="rooms c1">
        <div class="room" onclick="openEvent()">
          <span class="icon">🎉</span>
          <span class="rname">이벤트 코너</span>
          <span class="rgame">정보 이행시 짓기</span>
        </div>
      </div>
    </div>
    <div class="floor">
      <span class="floor-tag">3층</span>
      <div class="rooms c2" data-floor="3"></div>
    </div>
    <div class="floor">
      <span class="floor-tag">2층</span>
      <div class="rooms c3" data-floor="2"></div>
    </div>
    <div class="floor">
      <span class="floor-tag">1층</span>
      <div class="rooms c1" data-floor="1"></div>
    </div>
    <div class="ground"><div class="door"></div></div>
    <p class="footer">© copyright 보람고등학교 <b>윤정샘</b></p>
  </div>

  <!-- ========== 게임 화면 ========== -->
  <div id="game" class="card hidden">
    <div class="topbar">
      <button class="back" onclick="goHub()">← 학교로</button>
      <span class="title" id="gTitle">게임</span>
    </div>
    <div id="stage" class="stage"></div>
  </div>
</div>

<script>
/* ============================================================
   교과 데이터
============================================================ */
const SUBJECTS = {
  info:   {name:"정보", icon:"🐍", game:"스네이크 게임", floor:1, glow:true, credit:"제작: 정규성 · 김기훈 · 박상훈 · 송준섭"},
  ai:     {name:"인공지능 기초", icon:"🤖", game:"강아지·고양이 분류", floor:2},
  data:   {name:"데이터 과학", icon:"📊", game:"그래프 정답 맞히기", floor:2},
  cs:     {name:"정보과학", icon:"🧪", game:"물감 정렬 퍼즐", floor:2},
  iot:    {name:"사물인터넷과 센서 제어", icon:"🔌", game:"불 빨리 끄기", floor:3},
  big:    {name:"빅데이터 분석", icon:"🔍", game:"틀린 그림 찾기", floor:3},
  research:{name:"정보과제연구", icon:"📑", game:"연구 순서 맞추기", floor:3},
  swlife: {name:"소프트웨어와 생활", icon:"📱", game:"생활 SW 매칭", floor:3},
};
const PROMO = {
  info:"‘정보’는 컴퓨팅 사고력의 출발점!<br>문제를 논리적으로 나눠 해결하는 힘을 길러요.",
  ai:"‘인공지능 기초’에서는 컴퓨터가 데이터를 보고 분류·예측하는 원리를 배워요.",
  data:"‘데이터 과학’은 데이터를 시각화하고 해석해 의미를 찾아내는 과목이에요.",
  cs:"‘정보과학’은 정렬·탐색 같은 알고리즘으로 문제를 효율적으로 푸는 과목이에요.",
  iot:"‘사물인터넷과 센서 제어’는 센서로 세상을 감지하고 기기를 제어해요.",
  big:"‘빅데이터 분석’은 방대한 데이터 속 작은 차이·패턴을 찾아내요.",
  research:"‘정보과제연구’는 스스로 문제를 정하고 탐구 과정을 설계하는 과목이에요.",

function buildHub(){
  document.querySelectorAll('.rooms').forEach(c=>{

      const d = document.createElement('div');

    });
  });
}

const SNAKE_ENDPOINT = "https://script.google.com/macros/s/AKfycbz42AFnEXcQ77aZBsfjf72wSj8f4daEyuZ2968QUZFfvbKTctBEOSCRdK2zUwFvKFFwjA/exec";

async function submitSnakeScore(name, score, length){
  const payload = { type:'snake', name, score, length, time:new Date().toISOString() };
  if(!SNAKE_ENDPOINT){ saveLocalSnake(name, score); return; }
  try{
    await fetch(SNAKE_ENDPOINT, { method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload) });
  }catch(e){ saveLocalSnake(name, score); }
}

async function loadSnakeRanking(listEl){
  if(!listEl) return;
  let top=[];
  if(SNAKE_ENDPOINT){
    try{
      const res=await fetch(SNAKE_ENDPOINT, { method:'GET' });
      const data=await res.json();
      top = (data && data.top) ? data.top : [];
    }catch(e){ top = getLocalSnake(); }
  } else {
    top = getLocalSnake();
  }
  top = dedupeByName(top).sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,10);
  if(!top.length){ listEl.innerHTML='<li class="rank-empty">아직 기록이 없어요. 1등에 도전! 🏁</li>'; return; }
  const medal=i=> i<3 ? ['🥇','🥈','🥉'][i] : (i+1);
  listEl.innerHTML = top.map((r,i)=>
    `<li><span class="rk">${medal(i)}</span><span class="rn">${escapeHtml(r.name||'익명')}</span><span class="rs">${r.score||0}</span></li>`).join('');
}

// 같은 이름은 최고 점수만 남김
function dedupeByName(list){
  const best={};
  (list||[]).forEach(r=>{
    const name=(r.name==null?'':String(r.name)).trim()||'익명';
    const score=r.score||0;
    if(!(name in best) || score>best[name].score) best[name]={name, score};
  });
  return Object.values(best);
}
function saveLocalSnake(name, score){
  const a=dedupeByName([...getLocalSnake(), {name, score}]);
  a.sort((x,y)=>(y.score||0)-(x.score||0));
  try{ localStorage.setItem('snake_scores', JSON.stringify(a.slice(0,50))); }catch(_){}
}
function getLocalSnake(){ try{ return JSON.parse(localStorage.getItem('snake_scores')||'[]'); }catch(_){ return []; } }

function hud(items){
  return `<div class="hud">${items.map(i=>`<div class="pill"><div class="l">${i.l}</div><div class="v" id="${i.id}">${i.v}</div></div>`).join('')}</div>`;
}
const rnd = n => Math.floor(Math.random()*n);
const shuffle = a => { for(let i=a.length-1;i>0;i--){ const j=rnd(i+1); [a[i],a[j]]=[a[j],a[i]]; } return a; };

/* ============================================================
   스네이크 사운드 (Web Audio API로 합성 — 음원 파일 불필요)
   BGM 루프 + 사과 먹는 소리 + 벽 충돌 소리 + 음소거
============================================================ */
const SND = {
  ctx:null, master:null, bgmTimer:null, bgmStep:0,
  muted: localStorage.getItem('snake_muted')==='1',
  BGM:[523,659,784,659, 587,784,659,0, 523,659,880,784, 659,587,523,0], // 간단한 칩튠 루프
  ensure(){
    if(!this.ctx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return null;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = this.muted ? 0 : 0.6;
      this.master.connect(this.ctx.destination);
    }
    if(this.ctx.state==='suspended') this.ctx.resume();
    return this.ctx;
  },
  blip(freq, dur, type='square', vol=0.3, when=0){
    const ctx=this.ensure(); if(!ctx) return;
    const t=ctx.currentTime+when;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t+dur+0.02);
  },
  eat(){ this.blip(880,0.11,'square',0.35); this.blip(1320,0.10,'square',0.28,0.06); }, // 통통 튀는 소리
  hit(){ [[440,0],[330,0.13],[220,0.26],[130,0.42]].forEach(([f,w])=>this.blip(f,0.20,'sawtooth',0.4,w)); }, // 하강하는 실패음
  startBgm(){
    if(this.bgmTimer) return;
    this.ensure(); this.bgmStep=0;
    const beat=210;
    this.bgmTimer=setInterval(()=>{
      const n=this.BGM[this.bgmStep % this.BGM.length];
      if(n) this.blip(n, beat/1000*0.85, 'triangle', 0.22);
      this.bgmStep++;
    }, beat);
  },
  stopBgm(){ if(this.bgmTimer){ clearInterval(this.bgmTimer); this.bgmTimer=null; } },
  toggleMute(){
    this.muted=!this.muted;
    localStorage.setItem('snake_muted', this.muted?'1':'0');
    if(this.master) this.master.gain.value=this.muted?0:0.6;
    return this.muted;
  }
};
// 브라우저 자동재생 정책 대응: 페이지 첫 상호작용(클릭/터치/키)에서 오디오 잠금 해제
(function(){
  const unlock=()=>{
    const ctx=SND.ensure();
    if(ctx && ctx.state==='running'){
      ['pointerdown','touchstart','keydown','click'].forEach(ev=>document.removeEventListener(ev,unlock,true));
    }
  };
  ['pointerdown','touchstart','keydown','click'].forEach(ev=>document.addEventListener(ev,unlock,true));
})();
let snakeGen = 0; // 다시하기 시 이전 인스턴스가 새 BGM을 끄지 않도록 세대 관리

/* ============================================================
   게임 구현

const GAMES = {};

/* ---------- 1) 정보: 스네이크 게임 (학생 제작) ---------- */
GAMES.info = function(key){
  const myGen = ++snakeGen;
  const COLS=15, ROWS=15;
  const CELL = Math.max(18, Math.min(28, Math.floor((Math.min(460, window.innerWidth-70))/COLS)));
  const W = COLS*CELL, H = ROWS*CELL;
  const START_FPS = 7;

  // 이미지 로딩 (학생들이 그린 픽셀 아트 사용)
  const IMG = {};
  ['head_default','head_eat','head_hit','body','tail','food'].forEach(n=>{
    const im=new Image(); im.src='assets/snake/'+n+'.png'; IMG[n]=im;
  });

  stage.innerHTML = hud([{l:"점수",v:0,id:"sScore"},{l:"길이",v:3,id:"sLen"}]) +
    `<p class="center" style="font-size:13px;color:#888">🍎 를 먹으며 뱀을 키우세요! 벽·몸에 부딪히면 끝 (방향키 또는 아래 버튼)</p>
     <div class="snake-ctrl"><button id="snakeMute" class="mute-btn" title="소리 켜기/끄기"></button></div>
     <div class="snake-wrap"><canvas class="snake" id="scanvas" width="${W}" height="${H}"></canvas></div>
     <div class="dpad">
       <button class="u">▲</button><button class="l">◀</button>
       <button class="d">▼</button><button class="r">▶</button>
     </div>
     <p class="snake-credit">🐍 <b>스네이크 게임</b> · 제작: 정규성 · 김기훈 · 박상훈 · 송준섭</p>`;

  const cv = document.getElementById('scanvas');
  const ctx = cv.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const UP={x:0,y:-1}, DOWN={x:0,y:1}, LEFT={x:-1,y:0}, RIGHT={x:1,y:0};
  let snake, dir, nextDir, food, score, status, alive, timer;

  function reset(){
    snake=[{x:5,y:7},{x:4,y:7},{x:3,y:7}];
    dir=RIGHT; nextDir=RIGHT; score=0; status='default'; alive=true;
    placeFood();
  }
  function placeFood(){
    do { food={x:rnd(COLS),y:rnd(ROWS)}; }
    while(snake.some(s=>s.x===food.x&&s.y===food.y));
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#1e1e2f'; ctx.fillRect(0,0,W,H);
    blit(IMG.food, food.x, food.y);
    snake.forEach((seg,i)=>{
      let img;
      if(i===0) img = status==='hit'?IMG.head_hit : status==='eat'?IMG.head_eat : IMG.head_default;
      else if(i===snake.length-1) img = IMG.tail;
      else img = IMG.body;
      blit(img, seg.x, seg.y);
    });
  }
  function blit(img,gx,gy){
    if(img.complete && img.naturalWidth) ctx.drawImage(img, gx*CELL, gy*CELL, CELL, CELL);
    else { ctx.fillStyle='#7bed9f'; ctx.fillRect(gx*CELL+1, gy*CELL+1, CELL-2, CELL-2); }
  }
  function stepMove(){
    dir=nextDir;
    const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
    const hitWall = head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS;
    const hitSelf = snake.some((s,i)=> i<snake.length-1 && s.x===head.x && s.y===head.y);
    if(hitWall||hitSelf){ gameOver(); return; }
    snake.unshift(head);
    if(head.x===food.x && head.y===food.y){
      score++; status='eat'; placeFood(); SND.eat();
      document.getElementById('sScore').textContent=score;
    } else {
      snake.pop(); status='default';
    }
    document.getElementById('sLen').textContent=snake.length;
    draw();
  }
  function gameOver(){
    alive=false; status='hit'; draw(); stop();
    SND.stopBgm(); SND.hit();
    showSnakeResult(score, snake.length, ()=>GAMES.info(key));
  }

  function setDir(nd){
    if(dir.x+nd.x===0 && dir.y+nd.y===0) return;
    nextDir=nd;
  }
  const kb=e=>{
    const m={ArrowUp:UP,ArrowDown:DOWN,ArrowLeft:LEFT,ArrowRight:RIGHT};
    if(m[e.key]){ e.preventDefault(); setDir(m[e.key]); }
  };
  document.addEventListener('keydown',kb);
  stage.querySelector('.dpad .u').onclick=()=>setDir(UP);
  stage.querySelector('.dpad .d').onclick=()=>setDir(DOWN);
  stage.querySelector('.dpad .l').onclick=()=>setDir(LEFT);
  stage.querySelector('.dpad .r').onclick=()=>setDir(RIGHT);

  // 음소거 토글 버튼
  const muteBtn=document.getElementById('snakeMute');
  const setMuteLabel=()=>{ muteBtn.textContent = SND.muted ? '🔇 음소거' : '🔊 소리'; };
  setMuteLabel();
  muteBtn.onclick=()=>{ SND.ensure(); SND.toggleMute(); setMuteLabel(); };

  function loop(){ if(alive) stepMove(); }
  function start(){ timer=setInterval(loop, 1000/START_FPS); SND.startBgm(); }
  function stop(){ if(timer){ clearInterval(timer); timer=null; } }

  const obs=new MutationObserver(()=>{
    if(!document.body.contains(cv)){
      stop(); document.removeEventListener('keydown',kb); obs.disconnect();
      if(snakeGen===myGen) SND.stopBgm(); // 새 게임이 시작되지 않았을 때만 BGM 정지
    }
  });
  obs.observe(stage,{childList:true});

  reset(); draw(); start();
};

GAMES.data = function(key){
  const TOTAL=5; let round=0, score=0;
  const labels=["🍎","🍌","🍇","🍊","🍓"];
  stage.innerHTML = hud([{l:"문제",v:`0/${TOTAL}`,id:"round"},{l:"정답",v:0,id:"score"}]) +

    if(round>=TOTAL){ showResult(key,"📊 분석 완료!",`${TOTAL}문제 중 ${score}개 정답!`,()=>GAMES.data(key)); return; }
    const n=4, vals=[], set=labels.slice(0,n);
    while(vals.length<n){ const v=rnd(9)+2; if(!vals.includes(v)) vals.push(v); }
    const max=Math.max(...vals);
    document.getElementById('bars').innerHTML = vals.map((v,i)=>
      `<div class="bar" style="height:${v/max*150}px"><b>${v}</b><span>${set[i]}</span></div>`).join('');
    // 질문 유형
    const types=[
      {q:"가장 값이 큰 항목은?", ans:set[vals.indexOf(Math.max(...vals))]},
      {q:"가장 값이 작은 항목은?", ans:set[vals.indexOf(Math.min(...vals))]},
      {q:`값이 ${[...vals].sort((a,b)=>b-a)[1]}인 항목은?`, ans:set[vals.indexOf([...vals].sort((a,b)=>b-a)[1])]},
    ];
    const t=types[rnd(types.length)];
    document.getElementById('q').className='msg';
    document.getElementById('q').textContent=t.q;
    document.getElementById('round').textContent=`${round}/${TOTAL}`;
    document.getElementById('ch').innerHTML = shuffle(set.slice()).map(l=>`<button data-l="${l}">${l}</button>`).join('');
    document.querySelectorAll('#ch button').forEach(b=>b.onclick=()=>{
      if(b.dataset.l===t.ans){ score++; document.getElementById('score').textContent=score;
        document.getElementById('q').className='msg good'; document.getElementById('q').textContent='정답! ✅'; }
      else { document.getElementById('q').className='msg bad'; document.getElementById('q').textContent=`정답은 ${t.ans}`; }
      round++;
      setTimeout(make,700);
    });
  }
  make();
};

/* ---------- 4) 정보과학: 물감 정렬 퍼즐 ---------- */
GAMES.cs = function(key){
  const CAP=4;
  const colors=["#eb3b5a","#3867d6","#20bf6b","#f7b731"];
  // 정렬된 상태에서 거꾸로 섞어 항상 풀리게 생성
  let tubes;
  function genSolvable(){
    tubes = colors.map(c=>Array(CAP).fill(c));
    tubes.push([]); tubes.push([]); // 빈 튜브 2개
    for(let k=0;k<120;k++){
      const from=rnd(tubes.length), to=rnd(tubes.length);
      if(from===to||tubes[from].length===0||tubes[to].length>=CAP) continue;
      tubes[to].push(tubes[from].pop());
    }
    // 이미 완성돼 있으면 다시
    if(isWin()) return genSolvable();
  }
  let sel=-1, moves=0;
  function isWin(){ return tubes.every(t=>t.length===0 || (t.length===CAP && t.every(c=>c===t[0]))); }
  genSolvable();
  stage.innerHTML = hud([{l:"이동 수",v:0,id:"mv"}]) +
    `<p class="center" style="font-size:13px;color:#888">같은 색끼리 모으면 성공! 튜브를 눌러 붓고, 옮겨 담으세요.</p>
     <div class="tubes" id="tubes"></div>
     <div class="row"><button class="btn btn-ghost" id="reset">다시 섞기</button></div>`;
  const wrap=document.getElementById('tubes');
  function render(){
    wrap.innerHTML='';
    tubes.forEach((t,i)=>{
      const el=document.createElement('div'); el.className='tube'+(sel===i?' sel':'');
      // 채워진 칸(아래)부터 빈 칸(위)까지 항상 CAP개를 그림
      for(let j=0;j<CAP;j++){
        const s=document.createElement('div');
        if(j<t.length){ s.className='seg fill'; s.style.background=t[j]; }
        else { s.className='seg empty'; }
        el.appendChild(s);
      }
      el.onclick=()=>click(i); wrap.appendChild(el);
    });
    document.getElementById('mv').textContent=moves;
  }
  function click(i){
    if(sel===-1){ if(tubes[i].length) sel=i; render(); return; }
    if(sel===i){ sel=-1; render(); return; }
    const from=tubes[sel], to=tubes[i];
    const col=from[from.length-1];
    if(to.length<CAP && (to.length===0 || to[to.length-1]===col)){
      // 연속 같은 색 이동
      let moved=false;
      while(from.length && from[from.length-1]===col && to.length<CAP){ to.push(from.pop()); moved=true; }
      if(moved) moves++;
    }
    sel=-1; render();
    if(isWin()) setTimeout(()=>showResult(key,"🧪 정렬 완료!",`${moves}번 이동으로 성공!`,()=>GAMES.cs(key)),300);
  }
  document.getElementById('reset').onclick=()=>{ genSolvable(); sel=-1; moves=0; render(); };
  render();
};

/* ---------- 5) 빅데이터 분석: 틀린 그림 찾기 ---------- */
GAMES.big = function(key){
  const N=5, TOTAL=5; let round=0, found=0, diffIdx, base, changed;
  const pool=["🍎","🍊","🍋","🍇","🍉","🍓","🫐","🍑","🥝","🍒"];
  stage.innerHTML = hud([{l:"라운드",v:`0/${TOTAL}`,id:"round"},{l:"성공",v:0,id:"found"}]) +
    `<p class="center" style="font-size:13px;color:#888">두 그림에서 <b>딱 하나 다른 칸</b>을 찾아 누르세요!</p>
     <div class="msg" id="msg"></div>
     <div class="spot">
       <div><div class="spot-label">그림 A</div><div class="grid" id="gA"></div></div>
       <div><div class="spot-label">그림 B</div><div class="grid" id="gB"></div></div>
     </div>`;
  function make(){
    if(round>=TOTAL){ showResult(key,"🔍 분석 완료!",`${TOTAL} 라운드 중 ${found}개 발견!`,()=>GAMES.big(key)); return; }
    base = Array.from({length:N*N},()=>pool[rnd(pool.length)]);
    changed = base.slice();
    diffIdx = rnd(N*N);
    let nw; do{ nw=pool[rnd(pool.length)]; }while(nw===base[diffIdx]);
    changed[diffIdx]=nw;
    renderGrid('gA',base,true); renderGrid('gB',changed,true);
    document.getElementById('round').textContent=`${round}/${TOTAL}`;
    document.getElementById('msg').textContent='';
  }
  function renderGrid(id,arr,clickable){
    const g=document.getElementById(id); g.style.gridTemplateColumns=`repeat(${N},1fr)`;
    g.innerHTML=arr.map((e,i)=>`<div class="g" data-i="${i}">${e}</div>`).join('');
    if(clickable) g.querySelectorAll('.g').forEach(c=>c.onclick=()=>pick(+c.dataset.i));
  }
  function pick(i){
    const msg=document.getElementById('msg');
    if(i===diffIdx){ found++; document.getElementById('found').textContent=found;
      msg.className='msg good'; msg.textContent='찾았어요! ✅'; }
    else { msg.className='msg bad'; msg.textContent='다른 칸이에요 ❌'; return; }
    round++; setTimeout(make,700);
  }
  make();
};

/* ---------- 6) 사물인터넷: 불 빠르게 끄기(두더지) ---------- */
GAMES.iot = function(key){
  const HOLES=9; let score=0, time=20, timer, spawner;
  stage.innerHTML = hud([{l:"남은 시간",v:20,id:"time"},{l:"끈 불",v:0,id:"score"}]) +
    `<p class="center" style="font-size:13px;color:#888">센서가 감지한 🔥 를 눌러 빠르게 끄세요! (20초)</p>
     <div class="holes" id="holes"></div>`;
  const holes=[];
  for(let i=0;i<HOLES;i++){ const h=document.createElement('div'); h.className='hole';
    h.onclick=()=>{ if(h.classList.contains('fire')){ h.classList.remove('fire'); h.textContent=''; score++; document.getElementById('score').textContent=score; } };
    document.getElementById('holes').appendChild(h); holes.push(h); }
  function spawn(){
    const idle=holes.filter(h=>!h.classList.contains('fire'));
    if(idle.length){ const h=idle[rnd(idle.length)]; h.classList.add('fire'); h.textContent='🔥';
      setTimeout(()=>{ if(h.classList.contains('fire')){ h.classList.remove('fire'); h.textContent=''; } }, 900+rnd(500)); }
  }
  spawner=setInterval(spawn, 650);
  timer=setInterval(()=>{ time--; document.getElementById('time').textContent=time;
    if(time<=0){ clearInterval(timer); clearInterval(spawner);
      showResult(key,"🔥 진화 완료!",`20초 동안 ${score}개의 불을 껐어요!`,()=>GAMES.iot(key)); } },1000);
  // 화면 나갈 때 정리
  const obs=new MutationObserver(()=>{ if(!document.body.contains(stage.querySelector('#holes'))){ clearInterval(timer); clearInterval(spawner); obs.disconnect(); } });
  obs.observe(stage,{childList:true});
};

/* ---------- 7) 정보과제연구: 연구 순서 맞추기 ---------- */
GAMES.research = function(key){
  const correct=[
    "① 탐구 문제·주제 정하기",
    "② 자료·데이터 수집하기",
    "③ 데이터 분석·해석하기",
    "④ 결론 도출하기",
    "⑤ 보고서 작성·발표하기",
  ];
  let order = shuffle(correct.slice());
  while(order.join()===correct.join()) order=shuffle(correct.slice());
  stage.innerHTML = `<p class="center" style="font-size:13px;color:#888">연구(탐구)가 이루어지는 순서대로 위/아래 화살표로 정렬하세요.</p>
     <div class="order-list" id="list"></div>
     <div class="row"><button class="btn btn-primary" id="check">정렬 확인</button></div>`;
  function render(){
    const list=document.getElementById('list');
    list.innerHTML=order.map((t,i)=>`<div class="oitem"><span class="num">${i+1}</span><span class="txt">${t.replace(/^[①②③④⑤]\s/,'')}</span>
      <span class="mv"><button data-u="${i}">▲</button><button data-d="${i}">▼</button></span></div>`).join('');
    list.querySelectorAll('[data-u]').forEach(b=>b.onclick=()=>{ const i=+b.dataset.u; if(i>0){ [order[i-1],order[i]]=[order[i],order[i-1]]; render(); } });
    list.querySelectorAll('[data-d]').forEach(b=>b.onclick=()=>{ const i=+b.dataset.d; if(i<order.length-1){ [order[i+1],order[i]]=[order[i],order[i+1]]; render(); } });
  }
  render();
  document.getElementById('check').onclick=()=>{
    if(order.join()===correct.join()) showResult(key,"📑 정렬 성공!","탐구 과정 순서를 정확히 맞췄어요!",()=>GAMES.research(key));
    else { const m=document.createElement('div'); m.className='msg bad center'; m.textContent='순서가 아직 맞지 않아요. 다시 시도!';
      const old=stage.querySelector('.msg'); if(old)old.remove(); stage.querySelector('.order-list').after(m); setTimeout(()=>m.remove(),1500); }
  };
};

/* ---------- 8) 소프트웨어와 생활: 생활 SW 매칭 ---------- */
GAMES.swlife = function(key){
  const pairs=[
    {a:"🗺️ 낯선 곳 길찾기", b:"내비게이션 앱"},
    {a:"💬 친구와 대화", b:"메신저 앱"},
    {a:"🎵 음악 듣기", b:"음악 스트리밍"},
    {a:"💳 물건 값 결제", b:"모바일 페이"},
    {a:"📸 사진 보정", b:"이미지 편집 SW"},
  ];
  const left=pairs.map((p,i)=>({t:p.a,id:i}));
  const right=shuffle(pairs.map((p,i)=>({t:p.b,id:i})));
  let selL=-1, done=0;
  stage.innerHTML = `<p class="center" style="font-size:13px;color:#888">왼쪽 상황과 알맞은 소프트웨어를 짝지어 연결하세요!</p>
     <div class="msg" id="msg"></div>
     <div class="match"><div class="mcol" id="L"></div><div class="mcol" id="R"></div></div>`;
  const L=document.getElementById('L'), R=document.getElementById('R');
  L.innerHTML=left.map(x=>`<div class="mcell" data-id="${x.id}">${x.t}</div>`).join('');
  R.innerHTML=right.map(x=>`<div class="mcell" data-id="${x.id}">${x.t}</div>`).join('');
  L.querySelectorAll('.mcell').forEach(c=>c.onclick=()=>{
    if(c.classList.contains('done'))return;
    L.querySelectorAll('.mcell').forEach(x=>x.classList.remove('sel'));
    c.classList.add('sel'); selL=+c.dataset.id;
  });
  R.querySelectorAll('.mcell').forEach(c=>c.onclick=()=>{
    if(c.classList.contains('done')||selL===-1)return;
    const msg=document.getElementById('msg');
    if(+c.dataset.id===selL){
      c.classList.add('done'); L.querySelector(`.mcell.sel`).classList.add('done');
      L.querySelectorAll('.mcell').forEach(x=>x.classList.remove('sel')); selL=-1; done++;
      msg.className='msg good'; msg.textContent='연결 성공! ✅';
      if(done===pairs.length) setTimeout(()=>showResult(key,"📱 매칭 완료!","생활 속 소프트웨어를 모두 연결했어요!",()=>GAMES.swlife(key)),400);
    } else { msg.className='msg bad'; msg.textContent='짝이 맞지 않아요 ❌'; }
    setTimeout(()=>{ if(msg) msg.textContent=''; },800);
  });
};

/* ============================================================
   4층 이벤트 코너: 정보 이행시 → 구글 스프레드시트 저장
   ▼▼▼ 여기에 Google Apps Script 웹앱 주소(/exec)를 넣으세요 ▼▼▼
============================================================ */
const SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbyxw52ZV1YZMeJupGGpTWet7QLBhZTh-dIVtBSIhqaTk7s5YjgFmDex9LeiLImCO71g/exec";

function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function openEvent(){
  hub.classList.add('hidden'); gameEl.classList.remove('hidden');
  gTitle.textContent = "🎉 이벤트 코너";
  if(!SHEET_ENDPOINT){
    stage.innerHTML = `<div class="center" style="padding:24px 10px">
      <div style="font-size:52px">🚧</div>
      <h2 style="color:var(--purple);margin:8px 0">이벤트 준비 중</h2>
      <p class="ev-note">정보 이행시 이벤트가 곧 시작됩니다.<br>조금만 기다려 주세요!</p>
      <div class="row mt16"><button class="btn btn-primary" id="evHome">학교로</button></div>
    </div>`;
    document.getElementById('evHome').onclick = goHub;
    return;
  }
  stage.innerHTML = `
    <p class="center" style="font-size:13px;color:#888">‘정’과 ‘보’로 시작하는 <b>정보 이행시</b>를 지어 응모해 보세요!</p>
    <div class="event-form">
      <div class="field-row">
        <div class="field">
          <label>학번 <span class="req">*</span></label>
          <input id="evSid" maxlength="10" placeholder="예: 10203">
        </div>
        <div class="field">
          <label>이름 <span class="req">*</span></label>
          <input id="evName" maxlength="15" placeholder="예: 김정보">
        </div>
      </div>
      <div class="field">
        <label>정보 이행시</label>
        <div class="acrostic"><span class="syl">정</span><input id="evL1" maxlength="40" placeholder="‘정’으로 시작하는 첫 줄"></div>
        <div class="acrostic" style="margin-top:8px"><span class="syl">보</span><input id="evL2" maxlength="40" placeholder="‘보’로 시작하는 둘째 줄"></div>
      </div>
      <div class="msg" id="evMsg"></div>
      <button class="btn btn-primary" id="evSubmit">응모하기 ✏️</button>
      <p class="ev-note">응모 작품은 담당 선생님이 확인합니다.</p>
    </div>`;
  document.getElementById('evSubmit').onclick = submitEvent;
}

async function submitEvent(){
  const sid  = document.getElementById('evSid').value.trim();
  const name = document.getElementById('evName').value.trim();
  const l1   = document.getElementById('evL1').value.trim();
  const l2   = document.getElementById('evL2').value.trim();
  const msg  = document.getElementById('evMsg');
  if(!sid || !name){ msg.className='msg bad'; msg.textContent='학번과 이름을 모두 입력해 주세요!'; return; }
  if(!l1 || !l2){ msg.className='msg bad'; msg.textContent='이행시 두 줄을 모두 입력해 주세요!'; return; }
  if(!l1.startsWith('정') || !l2.startsWith('보')){ msg.className='msg bad'; msg.textContent='첫 줄은 ‘정’, 둘째 줄은 ‘보’로 시작해 주세요!'; return; }
  const btn  = document.getElementById('evSubmit'); btn.disabled=true; btn.textContent='전송 중...';
  const payload = { studentId:sid, name, line1:l1, line2:l2, time:new Date().toISOString() };
  try{
    if(!SHEET_ENDPOINT) throw new Error('endpoint 미설정');
    await fetch(SHEET_ENDPOINT, { method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload) });
  }catch(e){
    // 시트 연결 전이거나 전송 실패 시 이 기기에 백업 저장(나중에 복구 가능)
    try{ const bak=JSON.parse(localStorage.getItem('acrostic_bak')||'[]'); bak.push(payload); localStorage.setItem('acrostic_bak', JSON.stringify(bak)); }catch(_){}
  }
  eventThanks(name, l1, l2);
}

function eventThanks(name, l1, l2){
  stage.innerHTML = `
    <div class="center">
      <div style="font-size:52px">🎉</div>
      <h2 style="color:var(--purple);margin:6px 0">응모 완료!</h2>
      <div class="ev-poem"><div><b>${escapeHtml(l1[0])}</b>${escapeHtml(l1.slice(1))}</div><div><b>${escapeHtml(l2[0])}</b>${escapeHtml(l2.slice(1))}</div></div>
      <p class="ev-note">${name?escapeHtml(name)+'님, ':''}멋진 이행시 고마워요!<br>담당 선생님이 작품을 확인할 예정이에요.</p>
      <div class="row mt16">
        <button class="btn btn-ghost" id="evAgain">또 짓기</button>
        <button class="btn btn-primary" id="evHome">학교로</button>
      </div>
    </div>`;
  document.getElementById('evAgain').onclick = openEvent;
  document.getElementById('evHome').onclick = goHub;
}

/* ============================================================
   첫 접속 게이트: 보람고 정보 선택과목을 모두 선택해야 입장
============================================================ */
function showEntryGate(){
  if(localStorage.getItem('boram_entered')) return;           // 이미 입장한 적 있으면 건너뜀
  const subs = Object.entries(SUBJECTS).filter(([k,v])=>v.floor>=2); // 정보 선택과목 7개
  const ov=document.createElement('div'); ov.className='overlay gate';
  ov.innerHTML = `<div class="modal">
    <h2>보람고 정보 교과에 오신 걸<br>환영합니다! 🏫</h2>
    <p class="gate-sub">AI·데이터·사물인터넷·빅데이터…<br>미래를 여는 열쇠는 바로 <b>‘정보’</b>예요!</p>
    <div class="gate-promo">💜 정보 교과를 <b>많이 선택할수록</b> 진로의 문이 넓어져요!<br>
      보람고에 열린 <b>정보 선택과목을 모두 선택</b>하고 입장하세요 🚀</div>
    <div class="gate-grid" id="gateGrid">
      ${subs.map(([k,v])=>`<button class="gate-chip" data-k="${k}"><span class="gi">${v.icon}</span><span class="gt">${v.name}</span><span class="gc"></span></button>`).join('')}
    </div>
    <div class="gate-count">선택 <b id="gateN">0</b> / ${subs.length} 과목</div>
    <button class="btn btn-primary" id="gateEnter" disabled>입장하기 🚪</button>
  </div>`;
  document.body.appendChild(ov);
  const chosen=new Set();
  const enter=ov.querySelector('#gateEnter');
  const nEl=ov.querySelector('#gateN');
  ov.querySelectorAll('.gate-chip').forEach(c=>c.onclick=()=>{
    const k=c.dataset.k;
    if(chosen.has(k)){ chosen.delete(k); c.classList.remove('on'); c.querySelector('.gc').textContent=''; }
    else { chosen.add(k); c.classList.add('on'); c.querySelector('.gc').textContent='✓'; }
    nEl.textContent=chosen.size;
    enter.disabled = chosen.size < subs.length;
  });
  enter.onclick=()=>{ if(chosen.size<subs.length) return; localStorage.setItem('boram_entered','1'); ov.remove(); };
}

/* 시작 */
buildHub();
showEntryGate();
</script>
