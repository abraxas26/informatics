<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이진수 변환 게임</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    color: #2d3436;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    width: 100%;
    max-width: 460px;
    padding: 28px 26px 32px;
  }
  h1 {
    font-size: 24px;
    text-align: center;
    color: #4834d4;
    margin-bottom: 4px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 13px;
    margin-bottom: 18px;
  }
  /* 상단 상태바 */
  .statusbar {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 18px;
  }
  .stat {
    flex: 1;
    background: #f1f2f6;
    border-radius: 14px;
    padding: 10px 6px;
    text-align: center;
  }
  .stat .label { font-size: 11px; color: #888; }
  .stat .value { font-size: 20px; font-weight: bold; color: #4834d4; }

  /* 모드 선택 */
  .modes {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .mode-btn {
    flex: 1;
    padding: 9px 4px;
    border: 2px solid #dfe4ea;
    background: #fff;
    border-radius: 12px;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
    color: #555;
  }
  .mode-btn.active {
    background: #4834d4;
    border-color: #4834d4;
    color: #fff;
    font-weight: bold;
  }

  /* 문제 영역 */
  .question {
    background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%);
    border-radius: 18px;
    padding: 26px 16px;
    text-align: center;
    margin-bottom: 18px;
    color: #fff;
  }
  .question .ask { font-size: 15px; opacity: .9; margin-bottom: 8px; }
  .question .num {
    font-size: 52px;
    font-weight: bold;
    letter-spacing: 2px;
    font-family: 'Consolas', monospace;
  }
  .question .tag { font-size: 13px; opacity: .85; margin-top: 4px; }

  /* 입력 */
  .input-row { display: flex; gap: 8px; margin-bottom: 14px; }
  #answer {
    flex: 1;
    padding: 14px 16px;
    font-size: 22px;
    border: 2px solid #dfe4ea;
    border-radius: 12px;
    text-align: center;
    font-family: 'Consolas', monospace;
    letter-spacing: 2px;
    outline: none;
  }
  #answer:focus { border-color: #4834d4; }
  #submitBtn {
    padding: 0 22px;
    font-size: 16px;
    font-weight: bold;
    background: #00b894;
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
  }
  #submitBtn:active { transform: scale(0.97); }

  /* 피드백 */
  .feedback {
    text-align: center;
    min-height: 48px;
    font-size: 16px;
    font-weight: bold;
    padding: 10px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .feedback.correct { background: #d4f8e8; color: #00875a; }
  .feedback.wrong { background: #ffe0e0; color: #d63031; }

  /* 도움말 / 풀이 */
  .help {
    margin-top: 16px;
    background: #f8f9ff;
    border: 1px dashed #b2bec3;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 13px;
    color: #555;
    line-height: 1.7;
  }
  .help b { color: #4834d4; }
  .toggle-help {
    display: block;
    margin: 12px auto 0;
    background: none;
    border: none;
    color: #4834d4;
    font-size: 13px;
    cursor: pointer;
    text-decoration: underline;
  }
  /* 대결 버튼 */
  #battleBtn {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    font-size: 15px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(135deg, #ff7675 0%, #d63031 100%);
    border: none;
    border-radius: 12px;
    cursor: pointer;
  }
  #battleBtn:active { transform: scale(0.98); }
  #battleBtn.running {
    background: linear-gradient(135deg, #636e72 0%, #2d3436 100%);
  }
  #battleBtn:disabled {
    background: #b2bec3;
    cursor: not-allowed;
  }
  /* 관리자 / 순위 버튼 줄 */
  .admin-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: -12px 0 18px;
  }
  .link-btn {
    background: none; border: none;
    color: #888; font-size: 13px;
    cursor: pointer; text-decoration: underline;
  }
  /* 모달 입력칸 */
  .modal-input {
    width: 100%;
    padding: 13px 14px;
    font-size: 18px;
    border: 2px solid #dfe4ea;
    border-radius: 12px;
    text-align: center;
    outline: none;
    margin-bottom: 14px;
  }
  .modal-input:focus { border-color: #4834d4; }
  .result-box .ghost {
    background: #f1f2f6;
    color: #555;
    margin-top: 8px;
  }
  .result-box h2.blue { color: #4834d4; }
  .result-box p.lead { color:#555; font-size:14px; margin-bottom:14px; line-height:1.5; }
  /* 순위표 */
  .rank-list {
    text-align: left;
    margin: 4px 0 18px;
    max-height: 260px;
    overflow-y: auto;
  }
  .rank-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    border-radius: 10px;
    margin-bottom: 6px;
    background: #f1f2f6;
    font-size: 15px;
  }
  .rank-item.me { background: #ecebff; border: 1.5px solid #6c5ce7; }
  .rank-item .medal { width: 30px; text-align:center; font-weight:bold; color:#636e72; }
  .rank-item .rname { flex: 1; font-weight: bold; color:#2d3436; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rank-item .rscore { color: #4834d4; font-weight: bold; }
  .rank-empty { color:#b2bec3; padding: 24px 0; text-align:center; }
  /* 결과 모달 */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .overlay.show { display: flex; }
  .result-box {
    background: #fff;
    border-radius: 20px;
    padding: 30px 26px;
    text-align: center;
    max-width: 360px;
    width: 100%;
  }
  .result-box h2 { color: #d63031; font-size: 22px; margin-bottom: 14px; }
  .result-box .big {
    font-size: 56px;
    font-weight: bold;
    color: #4834d4;
    margin: 6px 0;
  }
  .result-box .msg { color: #555; font-size: 15px; margin: 10px 0 20px; line-height:1.6; white-space: pre-line; }
  .result-box button {
    width: 100%;
    padding: 13px;
    font-size: 15px;
    font-weight: bold;
    color: #fff;
    background: #00b894;
    border: none;
    border-radius: 12px;
    cursor: pointer;
  }
  /* 만든이 */
  .footer {
    text-align: center;
    margin-top: 22px;
    font-size: 13px;
    color: #b2bec3;
  }
  .footer b { color: #6c5ce7; }
  .bit-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
    font-family: 'Consolas', monospace;
    text-align: center;
  }
  .bit-table td {
    border: 1px solid #dcdde1;
    padding: 5px 2px;
    font-size: 13px;
  }
  .bit-table .head { background: #ecebff; color: #4834d4; font-weight: bold; }
</style>
</head>
<body>
  <div class="card">
    <h1>🔢 이진수 변환 게임</h1>
    <p class="subtitle">정보 2단원 · 이진수 복습</p>

    <div class="statusbar">
      <div class="stat"><div class="label">점수</div><div class="value" id="score">0</div></div>
      <div class="stat"><div class="label">연속정답</div><div class="value" id="streak">0</div></div>
      <div class="stat"><div class="label">문제</div><div class="value" id="count">0</div></div>
      <div class="stat" id="timerStat" style="display:none;">
        <div class="label">남은시간</div><div class="value" id="timer">3:00</div>
      </div>
    </div>

    <div class="modes">
      <button class="mode-btn active" data-mode="d2b">10진수 → 2진수</button>
      <button class="mode-btn" data-mode="b2d">2진수 → 10진수</button>
      <button class="mode-btn" data-mode="mix">랜덤 혼합</button>
    </div>

    <button id="battleBtn">⏱️ 3분 대결 모드 시작!</button>
    <div class="admin-row">
      <button class="link-btn" id="adminBtn">🔧 관리자</button>
      <button class="link-btn" id="rankBtn">🏆 순위 보기</button>
    </div>

    <div class="question">
      <div class="ask" id="ask">아래 수를 이진수로 바꿔보세요</div>
      <div class="num" id="qnum">7</div>
      <div class="tag" id="qtag">(10진수)</div>
    </div>

    <div class="input-row">
      <input type="text" id="answer" placeholder="정답 입력" autocomplete="off">
      <button id="submitBtn">확인</button>
    </div>

    <div class="feedback" id="feedback"></div>

    <button class="toggle-help" id="toggleHelp">💡 힌트 / 풀이 보기</button>
    <div class="help" id="help" style="display:none;"></div>

    <p class="footer">🎀 만든 사람: <b>윤정이</b> 🎀</p>
  </div>

  <!-- 대결 결과 -->
  <div class="overlay" id="overlay">
    <div class="result-box">
      <h2>⏱️ 3분 대결 끝!</h2>
      <div class="big" id="resultCount">0</div>
      <div class="msg" id="resultMsg">문제를 맞혔어요!</div>
      <h2 class="blue" style="font-size:18px;">🏆 순위표</h2>
      <div class="rank-list" id="resultRankList"></div>
      <button id="retryBtn">🔁 다시 도전!</button>
      <button id="resultCloseBtn" class="ghost">닫기</button>
    </div>
  </div>

  <!-- 이름 입력 -->
  <div class="overlay" id="nameOverlay">
    <div class="result-box">
      <h2 class="blue">🎮 3분 대결</h2>
      <p class="lead">이름(닉네임)을 입력하고 시작하세요!</p>
      <input class="modal-input" id="nameInput" maxlength="10" placeholder="예: 윤정이" autocomplete="off">
      <button id="nameStartBtn">시작! 🚀</button>
      <button id="nameCancelBtn" class="ghost">취소</button>
    </div>
  </div>

  <!-- 관리자 -->
  <div class="overlay" id="adminOverlay">
    <div class="result-box">
      <h2 class="blue">🔧 관리자</h2>
      <div id="adminLockView">
        <p class="lead">비밀번호를 입력하면 대결 모드가 켜져요.</p>
        <input class="modal-input" id="adminPw" type="password" placeholder="관리자 비밀번호" autocomplete="off">
        <button id="adminUnlockBtn">잠금 해제 🔓</button>
      </div>
      <div id="adminPanelView" style="display:none;">
        <p class="lead">대결 모드가 <b>켜져 있어요.</b><br>학생들이 대결을 시작할 수 있어요.</p>
        <button id="adminResetBtn" style="background:#d63031;">🗑️ 순위 전체 초기화</button>
        <button id="adminLockBtn" class="ghost">🔒 대결 모드 다시 잠그기</button>
      </div>
      <button id="adminCloseBtn" class="ghost">닫기</button>
    </div>
  </div>

  <!-- 순위 보기 -->
  <div class="overlay" id="rankOverlay">
    <div class="result-box">
      <h2 class="blue">🏆 순위표</h2>
      <div class="rank-list" id="rankViewList"></div>
      <button id="rankCloseBtn">닫기</button>
    </div>
  </div>

<script>
  let mode = 'd2b';        // 현재 모드
  let curDecimal = 0;      // 현재 문제의 10진수 값
  let curType = 'd2b';     // 이번 문제 실제 유형 (혼합 모드 대비)
  let score = 0, streak = 0, count = 0;
  let maxValue = 31;       // 문제로 낼 수 있는 최대값 (5비트)

  // 대결 모드 상태
  let battleOn = false;
  let battleCorrect = 0;
  let timeLeft = 180;      // 3분 = 180초
  let timerId = null;
  let prevMode = 'd2b';    // 대결 전 모드 기억

  // ── 관리자 / 순위 설정 ──
  const ADMIN_PASSWORD = "1234";              // ★ 관리자 비밀번호 (바꾸려면 여기 수정!)
  const LB_KEY = "binaryGameLeaderboard";     // 순위 저장 키
  const ADMIN_KEY = "binaryGameAdmin";        // 관리자 잠금해제 상태 키
  let playerName = "";
  let lastResultTime = 0;                      // 방금 친 기록 강조용

  const $ = id => document.getElementById(id);

  // 모드 버튼
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      mode = btn.dataset.mode;
      newQuestion();
    });
  });

  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function newQuestion() {
    // 혼합 모드면 매 문제 유형 랜덤
    curType = (mode === 'mix') ? (Math.random() < 0.5 ? 'd2b' : 'b2d') : mode;
    curDecimal = randInt(1, maxValue);

    if (curType === 'd2b') {
      $('ask').textContent = '아래 10진수를 이진수로 바꿔보세요';
      $('qnum').textContent = curDecimal;
      $('qtag').textContent = '(10진수)';
      $('answer').placeholder = '예: 111';
    } else {
      $('ask').textContent = '아래 이진수를 10진수로 바꿔보세요';
      $('qnum').textContent = curDecimal.toString(2);
      $('qtag').textContent = '(2진수)';
      $('answer').placeholder = '예: 7';
    }
    $('answer').value = '';
    $('feedback').className = 'feedback';
    $('feedback').textContent = '';
    $('help').style.display = 'none';
    $('answer').focus();
  }

  function checkAnswer() {
    let raw = $('answer').value.trim();
    if (raw === '') return;

    let correctAns, userOK;

    if (curType === 'd2b') {
      correctAns = curDecimal.toString(2);
      // 입력이 0과 1로만 이루어졌는지 확인
      if (!/^[01]+$/.test(raw)) {
        showWrong('이진수는 0과 1만 사용해요!', correctAns);
        return;
      }
      // 앞의 0 제거 후 비교 (0011 == 11 인정)
      userOK = (parseInt(raw, 2) === curDecimal);
    } else {
      correctAns = curDecimal.toString();
      if (!/^[0-9]+$/.test(raw)) {
        showWrong('10진수는 숫자만 입력하세요!', correctAns);
        return;
      }
      userOK = (parseInt(raw, 10) === curDecimal);
    }

    count++;

    // ── 대결 모드: 빠르게 진행, 맞힌 개수만 기록 ──
    if (battleOn) {
      if (userOK) {
        battleCorrect++;
        score += 10;
        streak++;
        $('feedback').className = 'feedback correct';
        $('feedback').textContent = '⭕ 정답! (' + battleCorrect + '개)';
      } else {
        streak = 0;
        $('feedback').className = 'feedback wrong';
        $('feedback').textContent = '❌ 정답: ' + correctAns;
      }
      updateStats();
      setTimeout(newQuestion, 500);  // 대결은 빠르게 다음 문제
      return;
    }

    // ── 일반 모드 ──
    if (userOK) {
      score += 10 + streak * 2;   // 연속 정답 보너스
      streak++;
      $('feedback').className = 'feedback correct';
      $('feedback').textContent = '⭕ 정답입니다! (+' + (10 + (streak-1)*2) + '점)';
      updateStats();
      setTimeout(newQuestion, 900);
    } else {
      showWrong('❌ 틀렸어요. 다시 생각해볼까요?', correctAns);
    }
  }

  function showWrong(msg, correctAns) {
    streak = 0;
    $('feedback').className = 'feedback wrong';
    $('feedback').textContent = msg + ' (정답: ' + correctAns + ')';
    updateStats();
    showHelp();             // 틀리면 풀이 자동 표시
    $('help').style.display = 'block';
  }

  function updateStats() {
    $('score').textContent = score;
    $('streak').textContent = streak;
    $('count').textContent = count;
  }

  // 풀이(자릿값 표) 만들기
  function showHelp() {
    const bits = curDecimal.toString(2);
    const len = bits.length;
    let placeRow = '<tr class="head"><td>자릿값</td>';
    let bitRow   = '<tr><td>2진수</td>';
    let calcRow  = '<tr><td>계산</td>';
    let sumParts = [];

    for (let i = 0; i < len; i++) {
      const place = Math.pow(2, len - 1 - i);   // 각 자리의 값 (... 8,4,2,1)
      const bit = bits[i];
      placeRow += '<td>' + place + '</td>';
      bitRow   += '<td><b>' + bit + '</b></td>';
      if (bit === '1') {
        calcRow += '<td>' + place + '</td>';
        sumParts.push(place);
      } else {
        calcRow += '<td>0</td>';
      }
    }
    placeRow += '</tr>'; bitRow += '</tr>'; calcRow += '</tr>';

    let html = '';
    if (curType === 'd2b') {
      html += '<b>' + curDecimal + '</b> 을(를) 2로 계속 나눈 나머지를 거꾸로 읽으면 → <b>' + bits + '</b><br>';
    } else {
      html += '<b>' + bits + '</b> 의 각 자리값(1인 곳)을 모두 더하면 → <b>' + curDecimal + '</b><br>';
    }
    html += '<table class="bit-table">' + placeRow + bitRow + calcRow + '</table>';
    html += '<div style="margin-top:8px;text-align:center;">'
          + (sumParts.length ? sumParts.join(' + ') + ' = <b>' + curDecimal + '</b>' : '')
          + '</div>';
    $('help').innerHTML = html;
  }

  // 이벤트 연결
  $('submitBtn').addEventListener('click', checkAnswer);
  $('answer').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      // 정답 후 자동 다음문제 대기중이 아닐 때만
      if ($('feedback').classList.contains('correct')) return;
      checkAnswer();
    }
  });
  $('toggleHelp').addEventListener('click', () => {
    if ($('help').style.display === 'none') {
      showHelp();
      $('help').style.display = 'block';
    } else {
      $('help').style.display = 'none';
    }
  });

  // ── 대결 모드 ──
  function fmtTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function startBattle() {
    battleOn = true;
    battleCorrect = 0;
    score = 0; streak = 0; count = 0;
    timeLeft = 180;
    prevMode = mode;
    mode = 'mix';            // 대결은 혼합 출제

    $('timerStat').style.display = 'block';
    $('timer').textContent = fmtTime(timeLeft);
    $('battleBtn').textContent = '⏹️ 대결 중단';
    $('battleBtn').classList.add('running');
    document.querySelectorAll('.mode-btn').forEach(b => b.disabled = true);

    updateStats();
    newQuestion();

    timerId = setInterval(() => {
      timeLeft--;
      $('timer').textContent = fmtTime(timeLeft);
      if (timeLeft <= 0) endBattle(true);
    }, 1000);
  }

  function endBattle(finished) {
    battleOn = false;
    clearInterval(timerId);
    timerId = null;

    $('timerStat').style.display = 'none';
    $('battleBtn').classList.remove('running');
    document.querySelectorAll('.mode-btn').forEach(b => b.disabled = false);
    mode = prevMode;
    applyAdminState();   // 대결 버튼 원래 상태로 (관리자 잠금 유지)

    if (finished) {
      // 점수를 순위표에 저장
      lastResultTime = saveScore(playerName, battleCorrect);

      $('resultCount').textContent = battleCorrect + '개';
      let msg;
      if (battleCorrect >= 30)      msg = '🏆 천재예요! 이진수 마스터!';
      else if (battleCorrect >= 20) msg = '🎉 정말 잘했어요!';
      else if (battleCorrect >= 10) msg = '👍 좋아요! 조금만 더!';
      else                          msg = '💪 다시 도전해봐요!';
      $('resultMsg').textContent = playerName + ' 님, 3분 동안 ' + battleCorrect + '문제 정답!\n' + msg;
      renderBoard('resultRankList', lastResultTime);
      $('overlay').classList.add('show');
    }
  }

  // ── 순위표(localStorage) ──
  function loadBoard() {
    try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; }
    catch (e) { return []; }
  }
  function saveScore(name, sc) {
    const board = loadBoard();
    const t = Date.now();
    board.push({ name: name, score: sc, t: t });
    localStorage.setItem(LB_KEY, JSON.stringify(board));
    return t;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  }
  function renderBoard(targetId, highlightT) {
    // 점수 높은 순, 같으면 먼저 기록한 사람 우선
    const board = loadBoard().sort((a, b) => b.score - a.score || a.t - b.t);
    const el = $(targetId);
    if (board.length === 0) {
      el.innerHTML = '<div class="rank-empty">아직 기록이 없어요.<br>첫 도전자가 되어보세요! 🎯</div>';
      return;
    }
    const medals = ['🥇', '🥈', '🥉'];
    el.innerHTML = board.slice(0, 50).map((e, i) => {
      const medal = medals[i] || (i + 1) + '위';
      const me = (e.t === highlightT) ? ' me' : '';
      return '<div class="rank-item' + me + '">'
           + '<span class="medal">' + medal + '</span>'
           + '<span class="rname">' + escapeHtml(e.name) + '</span>'
           + '<span class="rscore">' + e.score + '개</span></div>';
    }).join('');
  }

  // ── 관리자 ──
  function isAdmin() { return localStorage.getItem(ADMIN_KEY) === 'yes'; }
  function applyAdminState() {
    if (isAdmin()) {
      $('battleBtn').disabled = false;
      $('battleBtn').textContent = '⏱️ 3분 대결 모드 시작!';
    } else {
      $('battleBtn').disabled = true;
      $('battleBtn').textContent = '🔒 3분 대결 (관리자 활성화 필요)';
    }
  }
  function openAdmin() {
    if (isAdmin()) {
      $('adminLockView').style.display = 'none';
      $('adminPanelView').style.display = 'block';
    } else {
      $('adminLockView').style.display = 'block';
      $('adminPanelView').style.display = 'none';
      $('adminPw').value = '';
      $('adminPw').placeholder = '관리자 비밀번호';
    }
    $('adminOverlay').classList.add('show');
  }
  function tryUnlock() {
    if ($('adminPw').value === ADMIN_PASSWORD) {
      localStorage.setItem(ADMIN_KEY, 'yes');
      applyAdminState();
      openAdmin();   // 관리 패널로 전환
    } else {
      $('adminPw').value = '';
      $('adminPw').placeholder = '❌ 비밀번호가 틀렸어요';
    }
  }

  // ── 이름 입력 → 대결 시작 ──
  function confirmName() {
    const n = $('nameInput').value.trim();
    if (!n) { $('nameInput').focus(); return; }
    playerName = n;
    $('nameOverlay').classList.remove('show');
    startBattle();
  }

  // ── 이벤트 연결 ──
  $('battleBtn').addEventListener('click', () => {
    if (battleOn) { endBattle(false); return; }   // 진행 중이면 중단
    $('nameInput').value = playerName;
    $('nameOverlay').classList.add('show');
    setTimeout(() => $('nameInput').focus(), 50);
  });
  $('nameStartBtn').addEventListener('click', confirmName);
  $('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') confirmName(); });
  $('nameCancelBtn').addEventListener('click', () => $('nameOverlay').classList.remove('show'));

  $('retryBtn').addEventListener('click', () => {
    $('overlay').classList.remove('show');
    startBattle();   // 같은 이름으로 다시 도전
  });
  $('resultCloseBtn').addEventListener('click', () => $('overlay').classList.remove('show'));

  $('adminBtn').addEventListener('click', openAdmin);
  $('adminCloseBtn').addEventListener('click', () => $('adminOverlay').classList.remove('show'));
  $('adminUnlockBtn').addEventListener('click', tryUnlock);
  $('adminPw').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
  $('adminLockBtn').addEventListener('click', () => {
    localStorage.removeItem(ADMIN_KEY);
    applyAdminState();
    $('adminOverlay').classList.remove('show');
  });
  $('adminResetBtn').addEventListener('click', () => {
    if (confirm('정말 모든 순위 기록을 지울까요? 되돌릴 수 없어요.')) {
      localStorage.removeItem(LB_KEY);
      alert('순위가 초기화되었어요. 🧹');
    }
  });

  $('rankBtn').addEventListener('click', () => {
    renderBoard('rankViewList', -1);
    $('rankOverlay').classList.add('show');
  });
  $('rankCloseBtn').addEventListener('click', () => $('rankOverlay').classList.remove('show'));

  // 시작
  applyAdminState();
  newQuestion();
  updateStats();
</script>
</body>
</html>
